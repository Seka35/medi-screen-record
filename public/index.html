<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Record - Media Screen Recorder</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  
  <div class="layout">
    <!-- History Sidebar -->
    <aside class="glass-container history-panel">
      <h2>History</h2>
      <div id="historyList" class="history-list">
        <!-- History items will be injected here -->
      </div>
    </aside>

    <!-- Main Content -->
    <main class="glass-container recorder-container">
      <header>
        <h1>Recording Studio</h1>
        <p class="subtitle">Capture and share in one click.</p>
      </header>

      <!-- Settings / Toggles -->
      <div class="settings-bar">
        <label class="toggle-switch">
          <input type="checkbox" id="webcamToggle">
          <span class="slider round"></span>
          <span class="toggle-label">Enable Webcam (PIP)</span>
        </label>
      </div>

      <div class="video-preview-wrapper" id="recordingWrapper">
        <!-- The canvas is used to compose screen + webcam -->
        <canvas id="composeCanvas"></canvas>
        <div id="timer" class="timer">00:00</div>
      </div>

      <!-- Hidden videos used for drawing on canvas -->
      <video id="screenVideo" autoplay muted playsinline class="hidden-element"></video>
      <video id="webcamVideo" autoplay muted playsinline class="hidden-element"></video>

      <!-- Preview Mode Player (Hidden initially) -->
      <div class="video-preview-wrapper hidden" id="playbackWrapper">
        <video id="playbackPlayer" controls></video>
      </div>

      <!-- Trimming Controls (Hidden initially) -->
      <div id="trimControls" class="trim-controls hidden">
        <div class="trim-group">
          <label>Start (<span id="startDisplay">0.0</span>s)</label>
          <input type="range" id="startTrim" min="0" value="0" step="0.1">
        </div>
        <div class="trim-group">
          <label>End (<span id="endDisplay">0.0</span>s)</label>
          <input type="range" id="endTrim" min="0" value="0" step="0.1">
        </div>
      </div>

      <div class="controls" id="mainControls">
        <button id="startBtn" class="btn primary">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="3"></circle></svg>
          Record
        </button>
        <button id="stopBtn" class="btn danger" disabled>
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
          Stop
        </button>
      </div>

      <!-- Post Record Controls (Hidden initially) -->
      <div class="controls hidden" id="postRecordControls">
        <button id="retryBtn" class="btn secondary">Retry</button>
        <button id="uploadRawBtn" class="btn success">Send Raw (Fast)</button>
        <button id="uploadBtn" class="btn primary">Trim & Send</button>
      </div>

      <div id="uploadStatus" class="upload-status hidden">
        <p>Uploading & Processing...</p>
        <div class="progress-bar-container">
          <div id="progressBar" class="progress-bar"></div>
        </div>
        <p id="progressText" class="progress-text">0%</p>
      </div>

      <div id="shareSection" class="share-section hidden">
        <h3>Video Ready!</h3>
        <div class="link-container">
          <input type="text" id="shareLink" readonly />
          <button id="copyBtn" class="btn secondary">Copy</button>
        </div>
        <button id="quickNotesBtn" class="btn primary" style="margin-top: 1rem; width: 100%; justify-content: center;">📝 Add Notes / File</button>
      </div>
    </main>
  </div>

  <!-- Notes Modal -->
  <div id="notesModal" class="modal-overlay hidden">
    <div class="modal-content glass-container">
      <h3>Video Notes & Attachments</h3>
      <textarea id="notesTextarea" placeholder="Write your instructions or context here..."></textarea>
      
      <div class="file-upload-wrapper">
        <label for="attachmentInput" class="file-upload-label">
          <span id="attachmentNameDisplay">📎 Attach a file (PDF, Image, etc.)</span>
        </label>
        <input type="file" id="attachmentInput" class="hidden-element">
      </div>

      <div class="modal-actions">
        <button id="cancelNotesBtn" class="btn secondary">Cancel</button>
        <button id="saveNotesBtn" class="btn primary">Save</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
